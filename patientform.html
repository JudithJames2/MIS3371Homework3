<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration Form</title>
  <link rel="stylesheet" href="newstyle.css" type="text/css" />
  <script src="script.js"></script>
</head>
<body onload="displayDate()">
  <div id="header">
    <img src="./Customlogo.png" alt="Houston Medical Clinic Logo" id="logo">
  </div>

  <table width="100%">
    <tr>
      <td width="20%">
        <img src="Customlogo.png" alt="Medical Logo" width="120">
      </td>
      <td align="center">
        <h1>Houston Care Medical Center</h1>
        <h3>Patient Registration Form</h3>
      </td>
      <td align="right">
        <strong>Today is:</strong><br>
        <span id="today"></span>
      </td>
    </tr>
  </table>

  <hr>

  <div id="main">
    <form action="thanks.html" method="post" onsubmit="return reviewForm();">
      <div id="errorMessages"></div>
      <table class="formTable">
        <tr>
          <td><label for="firstname">First Name</label></td>
          <td>
            <input type="text" name="firstname" id="firstname" maxlength="30" required>
          </td>

          <td><label for="middle">Middle Initial</label></td>
          <td>
            <input type="text" name="middle" id="middle" maxlength="1" size="1">
          </td>

          <td><label for="lastname">Last Name</label></td>
          <td>
            <input type="text" name="lastname" id="lastname" maxlength="30" required>
          </td>
        </tr>

        <tr>
          <td><label for="dob">Date of Birth</label></td>
          <td>
            <input type="date" name="dob" id="dob" required>
          </td>

          <td><label for="ssn">Social Security</label></td>
          <td>
            <input type="text" name="ssn" id="ssn" maxlength="11" placeholder="XXX-XX-XXXX" required>
          </td>
        </tr>

        <tr>
          <td><label for="address1">Address Line 1</label></td>
          <td colspan="5">
            <input type="text" name="address1" id="address1" maxlength="30" size="60" required>
          </td>
        </tr>

        <tr>
          <td><label for="address2">Address Line 2</label></td>
          <td colspan="5">
            <input type="text" name="address2" id="address2" maxlength="30" size="60">
          </td>
        </tr>

        <tr>
          <td><label for="city">City</label></td>
          <td>
            <input type="text" name="city" id="city" maxlength="30" required>
          </td>

          <td><label for="state">State</label></td>
          <td>
            <select name="state" id="state" required>
              <option value="">Select</option>
              <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option>
              <option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option>
              <option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option>
              <option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option>
              <option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option>
              <option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option>
              <option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option><option value="NV">NV</option>
              <option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option>
              <option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option>
              <option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option>
              <option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option>
              <option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option>
              <option value="WI">WI</option><option value="WY">WY</option><option value="DC">DC</option><option value="PR">PR</option>
            </select>
          </td>

          <td><label for="zipcode">Zip Code</label></td>
          <td>
            <input type="text" name="zipcode" id="zipcode" maxlength="10" required>
          </td>
        </tr>

        <tr>
          <td><label for="email">Email</label></td>
          <td>
            <input type="email" name="email" id="email" placeholder="name@domain.tld" required>
          </td>

          <td><label for="phone">Phone</label></td>
          <td>
            <input type="tel" id="phone" name="phone" placeholder="000-000-0000" pattern="\d{3}-\d{3}-\d{4}" required>
          </td>
        </tr>

        <tr>
          <td>Medical History</td>
          <td colspan="5">
            <input type="checkbox" name="history[]" id="history_chickenpox" value="chicken_pox"> <label for="history_chickenpox">Chicken Pox</label><br>
            <input type="checkbox" name="history[]" id="history_measles" value="measles"> <label for="history_measles">Measles</label><br>
            <input type="checkbox" name="history[]" id="history_covid" value="covid19"> <label for="history_covid">COVID-19</label><br>
            <input type="checkbox" name="history[]" id="history_smallpox" value="small_pox"> <label for="history_smallpox">Small Pox</label><br>
            <input type="checkbox" name="history[]" id="history_tetanus" value="tetanus"> <label for="history_tetanus">Tetanus</label>
          </td>
        </tr>

        <tr>
          <td>Gender</td>
          <td colspan="5">
            <input type="radio" name="gender" id="gender_male" value="male"> <label for="gender_male">Male</label>
            <input type="radio" name="gender" id="gender_female" value="female"> <label for="gender_female">Female</label>
            <input type="radio" name="gender" id="gender_other" value="other"> <label for="gender_other">Other</label>
          </td>
        </tr>

        <tr>
          <td>Pain Level</td>
          <td colspan="5">
            <label for="pain">Rate your pain (1 = No Pain, 10 = Worst Pain):</label><br><br>
            <span id="rangeValue">1</span>
            <input type="range" id="pain" name="pain" min="1" max="10" value="1"
                   oninput="document.getElementById('rangeValue').textContent = this.value"
                   style="width: 100%; max-width: 300px; vertical-align: middle;">
          </td>
        </tr>

        <tr>
          <td>Vaccinated?</td>
          <td colspan="5">
            <input type="radio" name="vaccine" id="vaccine_yes" value="yes"> <label for="vaccine_yes">Yes</label>
            <input type="radio" name="vaccine" id="vaccine_no" value="no"> <label for="vaccine_no">No</label>
          </td>
        </tr>

        <tr>
          <td>Insurance?</td>
          <td colspan="5">
            <input type="radio" name="insurance" id="insurance_yes" value="yes"> <label for="insurance_yes">Yes</label>
            <input type="radio" name="insurance" id="insurance_no" value="no"> <label for="insurance_no">No</label>
          </td>
        </tr>

        <tr>
          <td><label for="userid">User ID:</label></td>
          <td>
            <input type="text" id="userid" name="userid" minlength="4" maxlength="15" required>
          </td>
        </tr>

        <tr>
          <td><label for="password">Password</label></td>
          <td>
            <input type="password" id="password" name="password" minlength="8" maxlength="20" required
                   pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#%^&*()\-\_=+\\\/><.,`~]).{8,20}"
                   title="8-20 chars, 1 uppercase, 1 lowercase, 1 number, 1 special character (no quotes)">
          </td>

          <td><label for="password_confirm">Re-enter Password</label></td>
          <td>
            <input type="password" id="password_confirm" name="password_confirm" minlength="8" maxlength="20" required>
          </td>
        </tr>

        <tr>
          <td colspan="2" align="center">
            <input type="reset" value="CLEAR AND START OVER">
            &nbsp;&nbsp;&nbsp;
            <input type="button" id="ValidateBtn" value="VALIDATE" onclick="validateForm()">
            &nbsp;&nbsp;&nbsp;
            <input type="submit" id="submitBtn" value="SUBMIT" style="display:none;">
          </td>
        </tr>
      </table>
    </form>
  </div>

  <hr>
  <div id="footer">
    <table width="100%">
      <tr>
        <td>
          <h3>Houston Care Medical Center</h3>
          PO Box 18881<br>
          Houston, TX 77477
        </td>

        <td align="center">
          <button onclick="window.location.href='https://www.google.com'">Contact Us</button>
        </td>

        <td align="right">
          <a href="https://facebook.com">Facebook</a><br>
          <a href="https://twitter.com">Twitter</a><br>
          <a href="https://instagram.com">Instagram</a>
        </td>
      </tr>
    </table>
  </div>

</body>
</html>
