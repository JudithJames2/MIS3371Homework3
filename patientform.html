<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Registration Form</title>
  <link rel="stylesheet" href="newstyle.css" type="text/css" />
  <script src="script.js"></script>
</head>
<body onload="displayDate()">
  <div id="header">
    <img src="./Customlogo.png" alt="Houston Medical Clinic Logo" id="logo">
  </div>

  <table width="100%">
    <tr>
      <td width="20%">
        <img src="Customlogo.png" alt="Medical Logo" width="120">
      </td>
      <td align="center">
        <h1>Houston Care Medical Center</h1>
        <h3>Patient Registration Form</h3>
      </td>
      <td align="right">
        <strong>Today is:</strong><br>
        <span id="today"></span>
      </td>
    </tr>
  </table>

  <hr>

  <div id="main">
    <form action="thanks.html" method="post" onsubmit="return reviewForm();">
<form id="patientForm" action="thanks.html" method="post">
      <div id="errorMessages"></div>
      <table class="formTable">
        <tr>
          <td><label for="firstname">First Name</label></td>
          <td>
            <input type="text" name="firstname" id="firstname" maxlength="30" required>
          </td>

          <td><label for="middle">Middle Initial</label></td>
          <td>
            <input type="text" name="middle" id="middle" maxlength="1" size="1">
          </td>

          <td><label for="lastname">Last Name</label></td>
          <td>
            <input type="text" name="lastname" id="lastname" maxlength="30" required>
          </td>
        </tr>

        <tr>
          <td><label for="dob">Date of Birth</label></td>
          <td>
            <input type="date" name="dob" id="dob" required>
          </td>

          <td><label for="ssn">Social Security</label></td>
          <td>
            <input type="text" name="ssn" id="ssn" maxlength="11" placeholder="XXX-XX-XXXX" required>
          </td>
        </tr>

        <tr>
          <td><label for="address1">Address Line 1</label></td>
          <td colspan="5">
            <input type="text" name="address1" id="address1" maxlength="30" size="60" required>
          </td>
        </tr>

        <tr>
          <td><label for="address2">Address Line 2</label></td>
          <td colspan="5">
            <input type="text" name="address2" id="address2" maxlength="30" size="60">
          </td>
        </tr>

        <tr>
          <td><label for="city">City</label></td>
          <td>
            <input type="text" name="city" id="city" maxlength="30" required>
          </td>

          <td><label for="state">State</label></td>
          <td>
            <select name="state" id="state" required>
              <option value="">Select</option>
              <option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option>
              <option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option>
              <option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option>
              <option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option>
              <option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option>
              <option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option>
              <option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option><option value="NV">NV</option>
              <option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option>
              <option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option>
              <option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option>
              <option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option>
              <option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option>
              <option value="WI">WI</option><option value="WY">WY</option><option value="DC">DC</option><option value="PR">PR</option>
            </select>
          </td>

          <td><label for="zipcode">Zip Code</label></td>
          <td>
            <input type="text" name="zipcode" id="zipcode" maxlength="10" required>
          </td>
        </tr>
